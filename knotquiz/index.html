<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>매듭 랜덤 문제 생성기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      box-sizing: border-box;
      background: #f5f5f5;
    }

    h1 {
      font-size: 20px;
      text-align: center;
      margin-bottom: 12px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: #2b7cff;
      color: #ffffff;
    }

    button:active {
      transform: scale(0.98);
    }

    .meta {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      text-align: right;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 6px 4px;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }

    th {
      text-align: left;
      color: #444;
    }

    .idx {
      width: 32px;
      text-align: center;
      color: #888;
    }

    .category {
      white-space: nowrap;
      width: 80px;
      color: #333;
      font-weight: 600;
    }

    .empty {
      text-align: center;
      color: #888;
      padding: 12px 0;
    }
  </style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G1DESB7W24"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-G1DESB7W24');
  </script>
</head>

<body>
  <h1>매듭 랜덤 문제 생성기</h1>

  <div class="card">
    <p style="font-size:13px; margin-top:0; margin-bottom:8px;">
      버튼을 누르면 아래 규칙으로 5문제가 출제됩니다.
    </p>
    <ul style="margin:0 0 10px 18px; padding:0; font-size:13px;">
      <li>마디짓기: 3문제</li>
      <li>이어매기: 1문제</li>
      <li>움켜매기: 1문제</li>
      <li>출제 순서: <b>마디짓기 → 이어매기 → 움켜매기</b></li>
    </ul>
    <button onclick="generateProblems()">문제 출제하기</button>
    <div class="meta">※ 새로고침하거나 다시 눌러도 매번 새로 출제됩니다.</div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th class="idx">No</th>
          <th class="category">구분</th>
          <th>문제</th>
        </tr>
      </thead>
      <tbody id="problem-body">
        <tr>
          <td colspan="3" class="empty">아직 출제된 문제가 없습니다.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const madiList = [
      "옭매듭",
      "두겹 옭매듭",
      "8자 매듭",
      "두겹 8자 매듭",
      "이중 8자 매듭",
      "줄사다리 매듭",
      "고정 매듭",
      "두겹 고정 매듭",
      "나비 매듭"
    ];

    const ieoList = [
      "바른 매듭",
      "한겹 매듭",
      "두겹 매듭",
      "8자 연결 매듭",
      "피셔맨 매듭"
    ];

    const umList = [
      "절반 매기",
      "잡아 매기",
      "감아 매기",
      "말뚝 매기"
    ];

    function shuffle(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickRandom(list, count) {
      if (list.length < count) {
        alert("문제 개수가 부족합니다. 배열을 확인하세요.");
        return [];
      }
      return shuffle(list).slice(0, count);
    }

    function generateProblems() {
      gtag('event', 'generate_knot_problem', {
        event_category: 'knot_quiz',
        event_label: 'generate_button'
      });

      const tbody = document.getElementById("problem-body");

      // 기존 출제 결과 삭제
      tbody.innerHTML = "";

      const m = pickRandom(madiList, 3);
      const e = pickRandom(ieoList, 1);
      const u = pickRandom(umList, 1);

      if (m.length !== 3 || e.length !== 1 || u.length !== 1) {
        tbody.innerHTML = `
          <tr>
            <td colspan="3" class="empty">문제은행에 항목이 충분하지 않습니다.</td>
          </tr>
        `;
        return;
      }

      const result = [
        ...m.map(name => ({ category: "마디짓기", name })),
        ...e.map(name => ({ category: "이어매기", name })),
        ...u.map(name => ({ category: "움켜매기", name }))
      ];

      result.forEach((item, idx) => {
        const tr = document.createElement("tr");

        const tdIdx = document.createElement("td");
        tdIdx.className = "idx";
        tdIdx.textContent = idx + 1;

        const tdCat = document.createElement("td");
        tdCat.className = "category";
        tdCat.textContent = item.category;

        const tdName = document.createElement("td");
        tdName.textContent = item.name;

        tr.appendChild(tdIdx);
        tr.appendChild(tdCat);
        tr.appendChild(tdName);

        tbody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
