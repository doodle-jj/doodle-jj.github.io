# Theme
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# Site Settings
locale: "ko-KR"
title: "더블제이 블로그"
name: "Double J"
description: "수영 훈련, 수상구조사 자격증 대비, 모의고사 등 실전 중심 정보를 제공하는 블로그"
url: "https://doodle-jj.github.io"
baseurl: ""
timezone: "Asia/Seoul"

# Author
author:
  name: "Double Jay"
  bio: "Archiving the "pause-worthy" moments hidden in plain sight."

# Pagination
paginate: 5
paginate_path: /page:num/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true

# Category / Tag
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-G1DESB7W24"
    anonymize_ip: false

# Exclude
exclude:
  - test
  - docs
  - CHANGELOG.md
  - README.md
  - LICENSE
  - Gemfile
  - package.json
  - package-lock.json
  - node_modules
  - vendor
  - log
  - tmp

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
