function shuffle(array) { const arr = [...array]; for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function sample(array, count) { return shuffle(array).slice(0, count); }

function generateExam() {

  currentExam = shuffle(selected); graded = false; document.getElementById("summary").classList.remove("show"); document.getElementById("summary").innerHTML = ""; renderExam(); window.scrollTo({ top: 0, behavior: "smooth" });
}

    return `<article class="question-card ${graded ? "graded" : ""}" id="qcard-${index}"><div class="q-head"><div class="q-no">문제 ${index + 1}</div><div class="origin">원문항 번호: ${q.originalNumber}번</div></div><div class="q-text">${escapeHTML(q.question)}</div><div class="choices">${choices}</div><div class="answer-note">${isUnanswered ? '<div class="warn">미응답 문항입니다.</div>' : ''}<b>정답:</b> ${q.answer}번${q.explanation ? `<br><b>해설:</b> ${escapeHTML(q.explanation)}` : ""}</div></article>`;

function getSelected(index) { const selected = document.querySelector(`input[name="q${index}"]:checked`); return selected ? Number(selected.value) : null; }
